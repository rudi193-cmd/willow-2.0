name: Tests

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare CI SAFE stub
        run: mkdir -p "${GITHUB_WORKSPACE}/.ci-safe/Applications"

      - name: Run test suite
        run: python3 -m pytest --ignore=tests/adversarial/e2e -v --timeout=60
        env:
          WILLOW_AGENT_NAME: ci
          WILLOW_SAFE_ROOT: ${{ github.workspace }}/.ci-safe/Applications
          WILLOW_PG_DB: willow_20_test
          WILLOW_PG_USER: postgres
          WILLOW_PG_HOST: localhost
          WILLOW_PG_PORT: 5432
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
