name: Tests

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install lint tools
        run: pip install ruff==0.15.0 mypy

      - name: Ruff (first-party, enforced)
        run: ruff check core sap willow tests scripts

      - name: Mypy (report-only)
        run: mypy core sap willow 2>&1 | tee mypy-report.txt || true

      - name: Upload mypy report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mypy-report
          path: mypy-report.txt
          if-no-files-found: ignore

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install bandit
        run: pip install bandit

      - name: Bandit (first-party, enforced)
        run: bandit -r core sap willow -ll -f txt 2>&1 | tee bandit-report.txt

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report
          path: bandit-report.txt
          if-no-files-found: ignore

  pytest-plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          # PRs: 3.11 only. push to master/main: 3.11 + 3.12 smoke.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo 'matrix={"include":[{"python-version":"3.11","with-coverage":true}]}' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"include":[{"python-version":"3.11","with-coverage":true},{"python-version":"3.12","with-coverage":false}]}' >> "$GITHUB_OUTPUT"
          fi

  pytest-matrix:
    needs: pytest-plan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.pytest-plan.outputs.matrix) }}

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      WILLOW_ROOT: ${{ github.workspace }}
      WILLOW_HOME: ${{ github.workspace }}/.ci-willow
      WILLOW_AGENT_NAME: ci
      WILLOW_SAFE_ROOT: ${{ github.workspace }}/.ci-safe/Applications
      WILLOW_AGENTS_ROOT: ${{ github.workspace }}/.ci-safe/Agents
      WILLOW_PG_DB: willow_20_test
      WILLOW_PG_USER: postgres
      WILLOW_PG_HOST: localhost
      WILLOW_PG_PORT: 5432
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      # Hang forensics (recurring ~59% pytest-matrix hang, 2026-07): a SELECT
      # blocked on a Postgres lock sits inside libpq's C poll loop, which the
      # default pytest-timeout signal method cannot interrupt — the job eats
      # its full timeout-minutes and is canceled with no traceback. These
      # server-side timeouts turn that silent hang into a fast, named error.
      PGOPTIONS: >-
        -c statement_timeout=90s
        -c lock_timeout=60s
        -c idle_in_transaction_session_timeout=120s
      COMFORT_SKIP_DUPLICATE_GUARDS: "1"

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e . --no-deps
          pip install -r requirements-dev.txt
          sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep

      - name: Prepare CI SAFE + USER stubs
        run: |
          mkdir -p "${WILLOW_SAFE_ROOT}" "${WILLOW_AGENTS_ROOT}" "${WILLOW_HOME}/store"
          echo "# CI stub" > "${WILLOW_HOME}/willow.md"
          printf 'WILLOW_ROOT=%s\nWILLOW_HOME=%s\n' "${WILLOW_ROOT}" "${WILLOW_HOME}" > "${WILLOW_HOME}/env"
          echo '{"version":1,"paths":{},"fleet":{"default_agent":""}}' > "${WILLOW_HOME}/settings.global.json"

      - name: Comfort check (layout, MCP registry, fast tests)
        env:
          WILLOW_MCP_PROFILE: full
        run: bash scripts/comfort_check.sh --ci

      - name: Run test suite
        run: |
          # --timeout-method=thread: the watchdog dumps every thread's stack
          # and exits even when the main thread is blocked in C (libpq),
          # where the default signal method never fires.
          if [ "${{ matrix.with-coverage }}" = "true" ]; then
            coverage run -m pytest --ignore=tests/adversarial/e2e -v --timeout=120 --timeout-method=thread
            coverage report -m --include='core/*,sap/*,willow/*' --fail-under=10
          else
            python3 -m pytest --ignore=tests/adversarial/e2e -v --timeout=120 --timeout-method=thread
          fi

  # Branch protection on master requires a check literally named "test".
  test:
    runs-on: ubuntu-latest
    needs: [pytest-matrix, lint]
    if: always()
    steps:
      - name: Require pytest matrix green
        run: test "${{ needs.pytest-matrix.result }}" = "success"

  path-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install ripgrep
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep

      - name: Reject legacy home paths in tracked code
        run: bash scripts/path_guard.sh

  store-import-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install ripgrep
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep

      - name: Reject direct WillowStore imports outside allowlist
        run: bash scripts/store_import_guard.sh

  surface-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify runtime skill surfaces match canonical
        run: python3 scripts/sync_remote_cursor_surface.py --check

  audit-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Kart sandbox audit — gated findings must stay closed
        run: python3 scripts/audit_verify.py
