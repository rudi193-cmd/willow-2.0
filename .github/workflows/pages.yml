name: Deploy GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - docs/index.html
      - docs/static/**
      - docs/.nojekyll
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build landing artifact
        run: |
          mkdir -p _site/static
          cp docs/index.html _site/
          cp docs/static/* _site/static/
          cp docs/.nojekyll _site/

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - uses: actions/deploy-pages@v5
        id: deployment
