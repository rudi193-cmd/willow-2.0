name: Upstream Contribution Tracker

on:
  schedule:
    - cron: '0 9 * * *'   # Daily at 9am UTC
  workflow_dispatch:
  push:
    branches: [master, main]
  pull_request:
    types: [closed]
    branches: [master, main]

jobs:
  update-tracker:
    # On PR close, only refresh after a merge to the default branch
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.repository.default_branch || github.ref }}
          token: ${{ secrets.UPSTREAM_TRACKER_PAT || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Run update script
        env:
          # gh search prs returns empty in Actions; GraphQL needs a user-scoped token.
          # Add repo secret UPSTREAM_TRACKER_PAT (classic PAT, public_repo scope) if unset.
          GH_TOKEN: ${{ secrets.UPSTREAM_TRACKER_PAT || github.token }}
        run: python .github/scripts/update_tracker.py

      - name: Open PR with tracker updates
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_TRACKER_PAT || github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CONTRIBUTORS.md
          if git diff --staged --quiet; then
            echo "No CONTRIBUTORS.md changes"
            exit 0
          fi
          branch="bot/upstream-tracker-${{ github.run_id }}"
          git checkout -b "$branch"
          git commit -m "docs: auto-update upstream contributions tracker"
          git push -u origin "$branch"
          gh pr create \
            --title "docs: auto-update upstream contributions tracker" \
            --body "Automated update from the Upstream Contribution Tracker workflow (run ${{ github.run_id }})." \
            --base master \
            --head "$branch"
          gh pr update-branch "$branch" --repo "${{ github.repository }}" || true
          gh pr merge --auto --squash --delete-branch "$branch" --repo "${{ github.repository }}"
