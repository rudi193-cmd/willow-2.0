name: Upstream Contribution Tracker

on:
  schedule:
    - cron: '0 9 * * *'   # Daily at 9am UTC
  workflow_dispatch:
  push:
    branches: [master, main]
  pull_request:
    types: [closed]
    branches: [master, main]

concurrency:
  group: upstream-tracker
  cancel-in-progress: true

jobs:
  update-tracker:
    # On PR close, only refresh after a merge to the default branch.
    # Skip runs triggered by the tracker's own auto-merge (github-actions[bot])
    # — they spawned a new racing PR per merge and the loop never converged.
    if: >-
      github.actor != 'github-actions[bot]' &&
      (github.event_name != 'pull_request' || github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.repository.default_branch || github.ref }}
          token: ${{ secrets.UPSTREAM_TRACKER_PAT || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Run update script
        env:
          # gh search prs returns empty in Actions; GraphQL needs a user-scoped token.
          # Add repo secret UPSTREAM_TRACKER_PAT (classic PAT, public_repo scope) if unset.
          GH_TOKEN: ${{ secrets.UPSTREAM_TRACKER_PAT || github.token }}
        run: python .github/scripts/update_tracker.py

      - name: Open PR with tracker updates
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_TRACKER_PAT || github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CONTRIBUTORS.md
          if git diff --staged --quiet; then
            echo "No CONTRIBUTORS.md changes"
            exit 0
          fi
          # One stable branch, force-reset each run. A unique branch per run
          # (the old bot/upstream-tracker-<run_id> scheme) left 40+ stale
          # branches and racing PRs that conflicted on CONTRIBUTORS.md.
          branch="bot/upstream-tracker"
          git checkout -B "$branch"
          git commit -m "docs: auto-update upstream contributions tracker"
          git push -f -u origin "$branch"
          # Reuse the open PR for this branch when one exists.
          existing=$(gh pr list --repo "${{ github.repository }}" --head "$branch" --state open --json number -q '.[0].number')
          if [ -z "$existing" ]; then
            gh pr create \
              --title "docs: auto-update upstream contributions tracker" \
              --body "Automated update from the Upstream Contribution Tracker workflow (latest run ${{ github.run_id }})." \
              --base master \
              --head "$branch"
          fi
          gh pr merge --auto --squash "$branch" --repo "${{ github.repository }}"
