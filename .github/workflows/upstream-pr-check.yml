name: Upstream Contribution Tracker

on:
  schedule:
    - cron: '0 9 * * *'   # Daily at 9am UTC
  workflow_dispatch:
  push:
    branches: [master, main]
  pull_request:
    types: [closed]
    branches: [master, main]

jobs:
  update-tracker:
    # On PR close, only refresh after a merge to the default branch
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.repository.default_branch || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run update script
        env:
          # gh search prs returns empty in Actions; GraphQL needs a user-scoped token.
          # Add repo secret UPSTREAM_TRACKER_PAT (classic PAT, public_repo scope) if unset.
          GH_TOKEN: ${{ secrets.UPSTREAM_TRACKER_PAT || github.token }}
        run: python .github/scripts/update_tracker.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add CONTRIBUTORS.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: auto-update upstream contributions tracker"
            git push
          fi
